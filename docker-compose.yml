version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claims-agent-api

    env_file:
      - .env

    ports:
      - "8000:8000"

    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: claims-agent-ui

    env_file:
      - .env

    ports:
      - "8501:8501"

    depends_on:
      - api

    restart: unless-stopped
